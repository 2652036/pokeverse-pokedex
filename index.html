<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéVerse - Binance Style Pokedex</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/css/phosphor.css" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header Section (Binance Style Top Navigation) -->
  <header class="header binance-nav">
    <div class="logo-container">
      <div class="pokeball-icon-wrapper">
        <i class="ph ph-pokeball-logo pokeball-loading-icon"></i>
      </div>
      <h1 class="logo-text">POKÉ<span>VERSE</span></h1>
    </div>

    <div class="header-right-cluster">
      <!-- Language Selector -->
      <div class="lang-selector">
        <button id="lang-ko-btn" class="lang-btn active">KO</button>
        <span class="divider">|</span>
        <button id="lang-en-btn" class="lang-btn">EN</button>
      </div>
      
      <!-- Counter Badge -->
      <div class="stats-counter binance-badge">
        <i class="ph ph-hash"></i>
        <span id="registered-label">등록됨</span>: <span id="registered-count">0</span> / 1025
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="main-container">
    <!-- Controls Section: Search & Filters -->
    <section class="controls-section binance-panel">
      <!-- Search Input -->
      <div class="search-wrapper">
        <i class="ph ph-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="이름 또는 도감 번호 검색..." autocomplete="off">
        <button id="clear-search" class="clear-search-btn hidden">
          <i class="ph ph-x"></i>
        </button>
      </div>

      <!-- Filters Row -->
      <div class="filter-options-row">
        <!-- Type Filter Selector -->
        <div class="dropdown-filter" id="type-filter-container">
          <button class="filter-select-btn binance-select-btn" id="type-select-btn">
            <span class="btn-content" id="type-btn-content"><i class="ph ph-sparkles"></i> 모든 타입</span>
            <i class="ph ph-caret-down caret"></i>
          </button>
          <div class="dropdown-menu binance-menu hidden" id="type-dropdown-menu">
            <!-- Dynamically populated type options -->
          </div>
        </div>

        <!-- Generation Filter Selector -->
        <div class="dropdown-filter" id="gen-filter-container">
          <button class="filter-select-btn binance-select-btn" id="gen-select-btn">
            <span class="btn-content" id="gen-btn-content"><i class="ph ph-globe-hemisphere-east"></i> 모든 세대</span>
            <i class="ph ph-caret-down caret"></i>
          </button>
          <div class="dropdown-menu binance-menu hidden" id="gen-dropdown-menu">
            <!-- Dynamically loaded in JS to support language swap -->
          </div>
        </div>

        <!-- Sorting Selector -->
        <div class="dropdown-filter" id="sort-filter-container">
          <button class="filter-select-btn binance-select-btn" id="sort-select-btn">
            <span class="btn-content" id="sort-btn-content"><i class="ph ph-sort-ascending"></i> 번호 순 (오름차순)</span>
            <i class="ph ph-caret-down caret"></i>
          </button>
          <div class="dropdown-menu binance-menu hidden" id="sort-dropdown-menu">
            <!-- Dynamically loaded in JS to support language swap -->
          </div>
        </div>
      </div>
    </section>

    <!-- Pokemon Grid Container -->
    <section class="grid-section">
      <div id="pokedex-grid" class="pokedex-grid">
        <!-- Cards dynamically injected here -->
      </div>

      <!-- Scroll sentinel / Loading Spinner -->
      <div id="loader" class="loader-container hidden">
        <div class="pokeball-spinner"></div>
        <p id="loader-text">포켓몬 데이터를 불러오는 중...</p>
      </div>

      <!-- No Results Message -->
      <div id="no-results" class="no-results-container hidden">
        <i class="ph ph-smiley-sad warning-icon"></i>
        <h3 id="no-results-title">검색 결과가 없습니다.</h3>
        <p id="no-results-desc">이름이나 도감 번호를 올바르게 입력했는지 확인해 주세요.</p>
        <button id="reset-filters-btn" class="reset-btn binance-btn-primary">필터 초기화</button>
      </div>
    </section>
  </main>

  <!-- Immersive Detail Modal (Binance Style) -->
  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal-container binance-modal">
      <!-- Top actions / close -->
      <div class="modal-header">
        <button id="modal-prev-btn" class="modal-nav-btn binance-btn-sec" title="이전 포켓몬">
          <i class="ph ph-arrow-left"></i>
        </button>
        <div class="modal-header-info">
          <span id="modal-pokemon-id" class="pokemon-id">#0001</span>
          <h2 id="modal-pokemon-name" class="pokemon-name">포켓몬 이름</h2>
        </div>
        <div class="modal-header-actions">
          <button id="modal-cry-btn" class="modal-action-btn binance-btn-sec" title="울음소리 듣기">
            <i class="ph ph-speaker-high"></i>
          </button>
          <button id="modal-close-btn" class="modal-action-btn binance-btn-sec close-btn" title="닫기">
            <i class="ph ph-x"></i>
          </button>
        </div>
      </div>

      <div class="modal-content">
        <!-- Left Side: Image & Types -->
        <div class="modal-visuals-col">
          <div class="modal-image-wrapper">
            <div class="modal-type-bg-glow" id="modal-glow-layer"></div>
            <img id="modal-pokemon-img" src="" alt="포켓몬 이미지" class="modal-pokemon-img">
          </div>
          <div id="modal-pokemon-types" class="pokemon-types-container">
            <!-- Badge elements -->
          </div>
          <p id="modal-pokemon-desc" class="pokemon-description-text">
            포켓몬 도감 설명
          </p>
        </div>

        <!-- Right Side: Detailed Stats & Evolutions -->
        <div class="modal-stats-col">
          <!-- Quick Info Cards -->
          <div class="quick-info-grid">
            <div class="info-card binance-card">
              <i class="ph ph-arrows-out-cardinal"></i>
              <div class="info-val" id="modal-pokemon-height">1.0 m</div>
              <div class="info-label" id="modal-height-label">키 (Height)</div>
            </div>
            <div class="info-card binance-card">
              <i class="ph ph-scales"></i>
              <div class="info-val" id="modal-pokemon-weight">10.0 kg</div>
              <div class="info-label" id="modal-weight-label">몸무게 (Weight)</div>
            </div>
            <div class="info-card binance-card">
              <i class="ph ph-lightning"></i>
              <div class="info-val" id="modal-pokemon-abilities">심록</div>
              <div class="info-label" id="modal-abilities-label">특성 (Abilities)</div>
            </div>
          </div>

          <!-- Base Stats Section -->
          <div class="stats-section binance-card">
            <h3 class="section-title" id="modal-stats-title"><i class="ph ph-chart-bar"></i> 기본 능력치 (Base Stats)</h3>
            <div class="stats-list" id="modal-stats-list">
              <!-- Stat rows will be dynamically populated -->
            </div>
          </div>

          <!-- Evolution Chain Section -->
          <div class="evolution-section binance-card">
            <h3 class="section-title" id="modal-evolution-title"><i class="ph ph-tree-structure"></i> 진화 과정 (Evolution Chain)</h3>
            <div class="evolution-chain-flow" id="modal-evolution-chain">
              <!-- Evolution node links -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom script file -->
  <script src="app.js"></script>
</body>
</html>
